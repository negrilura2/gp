version: '3.8'

services:
  backend:
    build: .
    container_name: voice_access_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env.docker
    environment:
      - APP_ENV=docker
      - PYTHONUNBUFFERED=1
    command: python backend/manage.py runserver 0.0.0.0:8000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: voice_access_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
