version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: voice_access_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: voice_access_db
      MYSQL_USER: voice_user
      MYSQL_PASSWORD: voice_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: voice_access_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  ai_service:
    build: .
    container_name: voice_access_ai
    ports:
      - "9000:9000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env.docker
    environment:
      - APP_ENV=docker
      - PYTHONUNBUFFERED=1
      # Override DB settings for AI service if it connects to DB directly (it usually doesn't, but just in case)
      - DB_HOST=db
    # Use uvicorn directly with reload for development
    command: uvicorn voice_engine.ai_app:app --host 0.0.0.0 --port 9000 --reload
    restart: unless-stopped
    depends_on:
      - db
      - redis

  backend:
    build: .
    container_name: voice_access_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env.docker
    environment:
      - APP_ENV=docker
      - PYTHONUNBUFFERED=1
      - DB_ENGINE=django.db.backends.mysql
      - DB_NAME=voice_access_db
      - DB_USER=voice_user
      - DB_PASSWORD=voice_password
      - DB_HOST=db
      - DB_PORT=3306
      - AI_SERVICE_URL=http://ai_service:9000
    command: >
      sh -c "python backend/manage.py migrate &&
             python backend/manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    depends_on:
      - db
      - ai_service

  frontend:
    build: ./frontend
    container_name: voice_access_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
