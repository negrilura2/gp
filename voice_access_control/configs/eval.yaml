# configs/eval.yaml
# Evaluation configuration
# Usage: python -m scripts.evaluate --config configs/eval.yaml

model:
  path: "checkpoints/ecapa_mfcc_delta_best.pth"

dataset:
  feature_dir: "data/features"
  noise_dir: null # Set to path (e.g. "data/noise") to enable noise augmentation

evaluation:
  max_pairs: 20000
  score_norm: "none" # none, znorm, tnorm, snorm
  cohort_speakers: 20
  cohort_utts_per_spk: 5
  cohort_seed: 42

paths:
  out_dir: "reports"
