# configs/train_noise.yaml
# 噪声增强训练配置文件
# 对应脚本: scripts/train.py (指定本配置)
#
# 使用方法:
# 1. 启动噪声增强训练:
#    python -m scripts.train --config configs/train_noise.yaml
#
# 2. 微调(Fine-tuning)模式:
#    确保下方 'pretrained_path' 已指向基础模型，并适当降低 'lr' (如 0.0001)

model:
  name: "ecapa_tdnn"
  emb_dim: 192
  feat_dim: 39      # MFCC-Delta (13*3)
  n_channels: 256 # Base ECAPA channels
  dropout: 0.2      # Dropout rate
  
  # Pretrained model path for fine-tuning
  # Uncomment the line below to resume training or fine-tune
  pretrained_path: "checkpoints/noise_augmented/ecapa_mfcc_delta_best.pth"

dataset:
  # Professional Split Mode for Noise Training
  # Train on RAW wavs (for on-the-fly augmentation)
  train_dir: "data/processed/train" 
  mode: "raw"
  
  # Validate on CLEAN features (standard benchmark)
  val_dir: "data/features/mfcc_delta/valid"
  
  noise_dir: "data/noise"       # Directory containing noise wavs
  feature_type: "mfcc_delta"
  n_mels: 40
  loader_workers: 0 # Windows set to 0 if issues arise, else 4

training:
  batch_size: 32
  epochs: 100
  lr: 0.0001 
  optimizer: "adam"  # adam, adamw
  loss: "aam"         # ce (CrossEntropy), aam (AAMSoftmax)
  device: "cuda"     # cuda, cpu
  weight_decay: 0.001 # Weight decay (L2 penalty)
  save_last: false
  
  # AAM-Softmax Params
  aam_s: 30.0
  aam_m: 0.1

  # Early Stopping
  early_stop: true
  patience: 20

paths:
  save_dir: "checkpoints/noise_augmented"
  log_dir: "reports/metrics/noise_augmented"
  feature_tag: "mfcc_delta_noise"

evaluation:
  eer_interval: 2
  eer_pairs: 20000
