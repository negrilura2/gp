# configs/train_noise.yaml
# Noise Augmented Training Configuration
# Usage: python -m scripts.train --config configs/train_noise.yaml

model:
  name: "ecapa_tdnn"
  emb_dim: 192
  feat_dim: 39      # MFCC-Delta (13*3)
  n_channels: 1024  # Base ECAPA channels

dataset:
  feature_dir: "data/processed" # Raw wavs for on-the-fly augmentation
  mode: "raw"
  noise_dir: "data/noise"       # Directory containing noise wavs
  feature_type: "mfcc_delta"
  n_mels: 40
  loader_workers: 4 # Windows set to 0 if issues arise, else 4

training:
  batch_size: 32
  epochs: 50
  lr: 0.001
  optimizer: "adam"  # adam, adamw
  loss: "ce"         # ce (CrossEntropy), aam (AAMSoftmax)
  device: "cuda"     # cuda, cpu
  
  # AAM-Softmax Params
  aam_s: 30.0
  aam_m: 0.2

  # Early Stopping
  early_stop: true
  patience: 10

paths:
  save_dir: "checkpoints/noise_augmented"
  log_dir: "reports/metrics/noise_augmented"
  feature_tag: "mfcc_delta_noise"

evaluation:
  eer_interval: 5
  eer_pairs: 20000
